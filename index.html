<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мои фильмы — синхронизация</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <input type="text" id="movieInput" placeholder="Название фильма, например: Матрица" autocomplete="off">
        <button id="addBtn">➕ Добавить</button>
        <button id="resetBtn" class="reset-btn">⟳ Сброс (7 фильмов)</button>
    </div>

    <div id="moviesContainer" class="movies-grid">
        <div class="loading">Загрузка списка...</div>
    </div>
    <footer>
        ⚡ Живая синхронизация между всеми устройствами через Firebase.<br>
        Добавляй, удаляй — изменения видны везде мгновенно.
    </footer>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        deleteDoc, 
        doc, 
        onSnapshot, 
        query, 
        orderBy, 
        getDocs, 
        writeBatch 
    } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ3i370Hhgjj7HQ0wYh42G1PeaBIfz848",
      authDomain: "adapt-12ba5.firebaseapp.com",
      projectId: "adapt-12ba5",
      storageBucket: "adapt-12ba5.firebasestorage.app",
      messagingSenderId: "297487806422",
      appId: "1:297487806422:web:afc0cb9f5227916f6f7e77",
      measurementId: "G-5J4KWHK2ZK"
    };

    let db;
    let moviesCollection;
    let unsubscribe = null;

    async function initFirebase() {
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            moviesCollection = collection(db, "movies");

            const q = query(moviesCollection, orderBy("createdAt"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                const defaultMovies = [
                    "Властелин колец", "Хоббит", "Звёздные войны",
                    "Гарри Поттер", "Джентльмены", "Бэтмен", "Форсаж"
                ];
                const batch = writeBatch(db);
                defaultMovies.forEach((movie, index) => {
                    const docRef = doc(moviesCollection);
                    batch.set(docRef, {
                        name: movie,
                        createdAt: new Date(Date.now() + index * 1000)
                    });
                });
                await batch.commit();
                console.log("База заполнена 7 фильмами");
            }

            const orderedQuery = query(moviesCollection, orderBy("createdAt", "asc"));
            unsubscribe = onSnapshot(orderedQuery, (snapshot) => {
                renderMovies(snapshot);
            });

            attachButtonHandlers();
        } catch (error) {
            console.error("Ошибка подключения к Firebase:", error);
            const container = document.getElementById("moviesContainer");
            if (container) {
                container.innerHTML = `<div class="empty-state">⚠️ Ошибка: не удалось подключиться к Firebase.<br>
                Проверьте конфигурацию в коде (firebaseConfig) и правила доступа Firestore.</div>`;
            }
        }
    }

    function renderMovies(snapshot) {
        const container = document.getElementById("moviesContainer");
        if (!container) return;

        if (snapshot.empty) {
            container.innerHTML = `<div class="empty-state">🎬 Список пуст. Добавьте первый фильм!</div>`;
            return;
        }

        let html = "";
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const movieName = data.name || "Без названия";
            const docId = docSnap.id;
            html += `
                <div class="movie-card" data-id="${docId}">
                    <div class="movie-title">
                        🎥 ${escapeHtml(movieName)}
                    </div>
                    <div class="movie-badge">⭐ рекомендую</div>
                    <button class="delete-btn" data-id="${docId}">🗑 Удалить</button>
                </div>
            `;
        });
        container.innerHTML = html;

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (id && db) {
                    try {
                        await deleteDoc(doc(db, "movies", id));
                        console.log("Фильм удалён");
                    } catch (err) {
                        console.error("Ошибка удаления:", err);
                        alert("Не удалось удалить фильм. Проверьте права доступа в Firestore.");
                    }
                }
            });
        });
    }

    async function addMovie(title) {
        if (!title.trim()) return false;
        try {
            await addDoc(moviesCollection, {
                name: title.trim(),
                createdAt: new Date()
            });
            return true;
        } catch (err) {
            console.error("Ошибка добавления:", err);
            alert("Не удалось добавить фильм. Проверьте подключение.");
            return false;
        }
    }

    async function resetToDefault() {
        if (!db) return;
        if (!confirm("Сбросить список к 7 фильмам? (Властелин колец, Хоббит, Звёздные войны, Гарри Поттер, Джентльмены, Бэтмен, Форсаж)")) return;
        try {
            const snapshot = await getDocs(moviesCollection);
            const batch = writeBatch(db);
            snapshot.forEach(docSnap => {
                batch.delete(docSnap.ref);
            });
            await batch.commit();

            const defaultMovies = [
                "Властелин колец", "Хоббит", "Звёздные войны",
                "Гарри Поттер", "Джентльмены", "Бэтмен", "Форсаж"
            ];
            const addBatch = writeBatch(db);
            defaultMovies.forEach((movie, idx) => {
                const newRef = doc(moviesCollection);
                addBatch.set(newRef, {
                    name: movie,
                    createdAt: new Date(Date.now() + idx * 100)
                });
            });
            await addBatch.commit();
            console.log("Сброс выполнен");
        } catch (err) {
            console.error("Ошибка сброса:", err);
            alert("Не удалось сбросить список.");
        }
    }

    function attachButtonHandlers() {
        const addBtn = document.getElementById("addBtn");
        const resetBtn = document.getElementById("resetBtn");
        const inputEl = document.getElementById("movieInput");

        if (!addBtn || !resetBtn) return;

        const newAdd = addBtn.cloneNode(true);
        const newReset = resetBtn.cloneNode(true);
        addBtn.parentNode.replaceChild(newAdd, addBtn);
        resetBtn.parentNode.replaceChild(newReset, resetBtn);

        newAdd.addEventListener('click', async () => {
            const value = inputEl.value.trim();
            if (value === "") return;
            const ok = await addMovie(value);
            if (ok) inputEl.value = "";
        });

        newReset.addEventListener('click', async () => {
            await resetToDefault();
        });

        inputEl.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const value = inputEl.value.trim();
                if (value === "") return;
                const ok = await addMovie(value);
                if (ok) inputEl.value = "";
            }
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    initFirebase();
</script>
</body>
</html>
